<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yönetimo — Yasal Belgeler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --primary:#0E9D8B; --primary-dark:#1C6F63; --text:#ECF2F0; --muted:#9DB0AB; --bg:#0E1614; --surface:#16211E; --border:#28332F; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); }
  .wrap { max-width:640px; margin:0 auto; padding:48px 24px; text-align:center; }
  .logo { width:72px; height:72px; border-radius:18px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; color:#fff; font-size:28px; font-weight:800; }
  h1 { font-size:24px; margin:0 0 8px; font-weight:800; }
  p.sub { color:var(--muted); margin:0 0 32px; font-size:15px; }
  .links { display:flex; flex-direction:column; gap:12px; }
  a.card { display:block; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px 20px; text-decoration:none; color:var(--text); font-weight:600; font-size:15px; text-align:left; transition:border-color .15s; }
  a.card:hover { border-color:var(--primary); }
  a.card span.arrow { float:right; color:var(--muted); }
  footer { margin-top:40px; color:var(--muted); font-size:12px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Y</div>
    <h1>Yönetimo — Yasal Belgeler</h1>
    <p class="sub">Apartman ve site yönetim uygulaması</p>
    <div class="links">
      <a class="card" href="privacy.html">Gizlilik Politikası <span class="arrow">→</span></a>
      <a class="card" href="terms.html">Kullanım Koşulları <span class="arrow">→</span></a>
      <a class="card" href="support.html">Destek <span class="arrow">→</span></a>
    </div>
    <footer>© 2026 Yönetimo · destek: yonetimo.support@gmail.com</footer>
  </div>
</body>
</html>
